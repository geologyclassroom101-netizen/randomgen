<!DOCTYPE html>
<html>
<head>
<title>Earthquake Assignment Generator</title>

<style>
body {
font-family: Arial;
text-align: center;
margin-top: 60px;
background-color: #f4f6f8;
}

h1 {
font-size: 34px;
}

#number {
font-size: 80px;
margin: 40px;
font-weight: bold;
color: #1e4fd1;
}

button {
font-size: 22px;
padding: 14px 30px;
cursor: pointer;
background-color: #1e4fd1;
color: white;
border: none;
border-radius: 6px;
}

button:hover {
background-color: #163aa3;
}
</style>

</head>

<body>

<h1>Earthquake Assignment Number</h1>

<p>Click the button to generate your assigned earthquake number (1–35).</p>

<div id="number">?</div>

<button onclick="spin()">Generate Number</button>

<script>

function spin() {

let counter = 0;

let spinner = setInterval(function(){

let random = Math.floor(Math.random() * 35) + 1;

document.getElementById("number").innerHTML = random;

counter++;

if(counter > 15){
clearInterval(spinner);
}

},100);

}

</script>

</body>
</html>
